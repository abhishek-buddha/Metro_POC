version: '3.8'

services:
  # Redis for job queue and session state
  redis:
    image: redis:7-alpine
    container_name: kyc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # FastAPI Webhook Service
  webhook:
    build: .
    container_name: kyc-webhook
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn src.webhook.app:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Extraction Worker (3 instances for parallel processing)
  worker-1:
    build: .
    container_name: kyc-worker-1
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: python -m src.workers.extraction_worker
    restart: unless-stopped

  worker-2:
    build: .
    container_name: kyc-worker-2
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: python -m src.workers.extraction_worker
    restart: unless-stopped

  worker-3:
    build: .
    container_name: kyc-worker-3
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: python -m src.workers.extraction_worker
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
